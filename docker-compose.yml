services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: marketplace-app
    volumes:
      - ./marketplace_app:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: marketplace_db
      DB_USERNAME: marketplace
      DB_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - marketplace

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    ports:
      - "8010:80"
    volumes:
      - ./marketplace_app:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - marketplace

  # MySQL Service
  mysql:
    image: mysql:8
    container_name: marketplace_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketplace_db
      MYSQL_USER: marketplace
      MYSQL_PASSWORD: secret
    ports:
      - "3310:3306" 
    volumes:
      - marketplace_mysql_data:/var/lib/mysql
    networks:
      - marketplace

networks:
  marketplace:

volumes:
  marketplace_mysql_data:

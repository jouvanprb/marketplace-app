server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Laravel: semua request diarahkan ke index.php kecuali file/folder yang ada
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proses file PHP dengan PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;          # "app" adalah nama service PHP-FPM di docker-compose
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blokir akses ke file/folder tersembunyi (.env, .git, dll)
    location ~ /\. {
        deny all;
    }
}